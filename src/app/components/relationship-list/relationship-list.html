<div class="details-section primary-section relationship-list-section">
  <label class="primary-label">Relationships</label>
  
  <!-- Filter buttons -->
  <div class="relationship-filters">
    <div class="filter-group">
      <label class="filter-label">Show:</label>
      <button type="button" class="filter-btn" [class.active]="relationshipFilter === 'all'" (click)="setRelationshipFilterAsync('all')">All</button>
      <button type="button" class="filter-btn" [class.active]="relationshipFilter === 'with-relationship'" (click)="setRelationshipFilterAsync('with-relationship')">With Relationship</button>
      <button type="button" class="filter-btn" [class.active]="relationshipFilter === 'without-relationship'" (click)="setRelationshipFilterAsync('without-relationship')">Without Relationship</button>
      <!-- <button type="button" (click)="testClick()">Test</button> -->
    </div>
    
    <div class="filter-group">
      <label class="filter-label">Story:</label>
      <!-- <select class="story-filter-select" [value]="storyFilter" (change)="onStoryFilterChange($event)">
        <option value="all">All Stories</option>
        @for (story of availableStories; track story) {
          <option [value]="story">{{ story }}</option>
        }
      </select> -->
    </div>
  </div>
  
  <div class="details-section relationship-section relationship-grid-container">
    @for(secondaryCharacter of filteredCharacterList; track secondaryCharacter.id) {
      <div class="relationship-header">
        <input type="checkbox" id="relationship-checkbox-{{secondaryCharacter.id}}"
        [checked]="(getRelationship(primaryCharacterId, secondaryCharacter.id))?.has_relationship"
        (change)="toggleRelationship($event, secondaryCharacter.id)"
        />
        {{secondaryCharacter.personal_name}} {{secondaryCharacter.family_name}}
      </div>
    }
  </div>
